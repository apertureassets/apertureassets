<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApertureAssets</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #1d1d1d;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 8%;
            background: white;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 24px;
            padding: 0;
            margin: 0;
        }
        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f5f5f5;
        }
        .hero-content {
            max-width: 700px;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 28px;
            background: #1d1d1d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
        footer {
            text-align: center;
            padding: 40px;
            background: #fafafa;
        }
    </style>
</head>
<body>
<nav>
    <div class="logo">ApertureAssets</div>
    <ul>
        <li>Destinations</li>
        <li>Itineraries</li>
        <li>Photography</li>
        <li>About</li>
    </ul>
</nav>
<section class="hero">
    <div class="hero-content">
        <h1>See More Of The World Without Quitting Your Job</h1>
        <p>
            Practical itineraries, honest budgets and photography
            for people balancing travel with full-time careers.
        </p>
        <a href="#" class="button">Explore Destinations</a>
    </div>
</section>
<footer>
    © ApertureAssets
</footer>
</body>
</html>
